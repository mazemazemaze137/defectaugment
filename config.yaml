# 数据路径
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  dataset_name: "NEU-CLS"  # 或 MVTec, Severstal 等

# 图像参数
image:
  size: 256
  grayscale: true

# 增强设置
augmentation:
  traditional:
    enable: true
    num_samples: 100
  gan:
    enable: true
    model_path: "models/gan_generator.pth"
    num_samples: 100
    latent_dim: 100
    epochs: 50
    batch_size: 32
    lr: 0.0002

# 评估
evaluation:
  metrics: ["FID", "SSIM", "PSNR"]
  visualize: true
  output_dir: "results"