data:
  raw_dir: "data/raw/mock_defects"
  processed_dir: "data/processed/mock_defects"

image:
  size: 128
  grayscale: true

augmentation:
  traditional:
    enable: false
  gan:
    enable: true
    epochs: 500          # 建议至少 500 轮
    batch_size: 4        # 如果显存不足，改为 2
    image_size: 128
    latent_dim: 100
    lr: 0.0002
    lr_g: 0.0002
    lr_d: 0.00005
    save_interval: 20
    num_test_samples: 8

evaluation:
  metrics: ["SSIM", "PSNR"]
  visualize: true
  output_dir: "results"
